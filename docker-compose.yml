services:
  tsm-auth:
    build: ./auth
    ports:
      - "3001:3000"
    env_file:
      - ./auth/.env
    depends_on:
      - tsm-auth-mongo
  
  tsm-auth-mongo:
    image: mongo:latest
    container_name: tsm-auth-mongo
    ports:
      - "27017:27017"
    # volumes:
    #   - auth-mongo-data:/data/db

  tsm-task:
    build: ./task
    ports:
      - "3002:3000"
    env_file:
      - ./task/.env
    depends_on:
      - tsm-task-mongo

  tsm-task-mongo:
    image: mongo:latest
    container_name: tsm-task-mongo
    ports:
      - "27018:27017"
    # volumes:
    #   - auth-task-data:/data/db

  # volumes:
  #   auth-mongo-data:
  #   task-mongo-data